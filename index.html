<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content-Security-Policy: this app has no backend, so the strongest defence
      against a stray script reading the Spotify tokens in localStorage is to
      restrict where scripts may come from. Everything is self-hosted (Tailwind is
      built in, fonts are bundled via @fontsource) — the only external script is
      Spotify's required Web Playback SDK. Album art is allowed from any https
      image host (images can't run code). connect-src is scoped to Spotify; expand
      it when adding data sources (news/sports/weather) in a later phase.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' https://sdk.scdn.co;
        style-src 'self' 'unsafe-inline';
        font-src 'self';
        img-src 'self' data: https:;
        media-src 'self' blob: https://*.scdn.co;
        connect-src 'self' https://api.spotify.com https://accounts.spotify.com https://*.spotify.com https://*.scdn.co wss://*.spotify.com wss://*.scdn.co ws://127.0.0.1:* ws://localhost:*;
        frame-src https://sdk.scdn.co https://*.spotify.com https://*.spotifycdn.com;
        worker-src 'self' blob:;
        object-src 'none';
        base-uri 'self';
        form-action 'self';
      "
    />
    <title>Radio DJ — your playlist, with a voice</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📻</text></svg>">
    <meta name="description" content="A personal radio in the browser: plays your Spotify playlist with an AI DJ who reads the news, scores, weather and song facts between tracks. Pick a station, pick a voice." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
